name: Deploy to ECS

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: BASE_PATH= npx @11ty/eleventy --output=_site-deploy

      - name: Package build
        run: |
          cd _site-deploy && zip -r ../_site-deploy.zip . && cd ..

      - name: Upload & extract on server
        env:
          SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
          SSH_HOST: ${{ secrets.ECS_HOST }}
          SSH_USER: ${{ secrets.ECS_USER }}
          WEB_ROOT: ${{ secrets.ECS_WEB_ROOT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

          scp _site-deploy.zip $SSH_USER@$SSH_HOST:$WEB_ROOT

          ssh $SSH_USER@$SSH_HOST "cd $WEB_ROOT && powershell -Command \"Expand-Archive -Path _site-deploy.zip -DestinationPath . -Force; Remove-Item _site-deploy.zip -Force\" && echo Deploy OK"
