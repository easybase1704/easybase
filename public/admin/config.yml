backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "products"
    label: "产品管理"
    label_singular: "产品"
    folder: "src/_data"
    create: true
    slug: "{{slug}}"
    extension: json
    format: json
    fields:
      - {label: "型号", name: "name", widget: "string"}
      - {label: "分类ID", name: "classId", widget: "number"}
      - {label: "简要介绍", name: "duibi", widget: "string", required: false}
      - {label: "处理器", name: "cpu", widget: "text"}
      - {label: "内存", name: "neicun", widget: "text"}
      - {label: "存储", name: "ssd", widget: "text"}
      - {label: "扩展接口", name: "jiekou", widget: "text"}
      - {label: "推荐", name: "isHot", widget: "boolean", default: false}

  - name: "news"
    label: "新闻管理"
    label_singular: "新闻"
    folder: "src/_data"
    create: true
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "分类", name: "classId", widget: "select", options: ["公司新闻", "行业新闻", "产品资讯"]}
      - {label: "描述", name: "description", widget: "text"}
      - {label: "日期", name: "date", widget: "date"}
      - {label: "内容", name: "body", widget: "markdown"}

  - name: "settings"
    label: "网站设置"
    files:
      - name: "site"
        label: "网站配置"
        file: "src/_data/site.json"
        fields:
          - {label: "公司名", name: "name", widget: "string"}
          - {label: "电话", name: "phone", widget: "string"}
          - {label: "地址", name: "address", widget: "string"}
          - {label: "SEO关键词", name: "keywords", widget: "text"}
          - {label: "SEO描述", name: "description", widget: "text"}
